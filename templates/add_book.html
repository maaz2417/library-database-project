{% extends 'base.html' %}
{% block content %}
<h1>Add New Book</h1>
{% if msg %}
    {{ msg|safe }}
{% endif %}
<div class='card'>
    <form method='POST'>
        <div class='form-row'>
            <div class='form-group'><label>Book Title *</label><input type='text' name='title' placeholder='e.g. Clean Code' required></div>
            <div class='form-group'><label>Author *</label><input type='text' name='author' placeholder='e.g. Robert C. Martin' required></div>
        </div>
        <div class='form-row'>
            <div class='form-group'><label>Category *</label><input type='text' name='category' placeholder='e.g. Computer Science' required></div>
            <div class='form-group'><label>ISBN *</label><input type='text' name='isbn' placeholder='e.g. 978-0132350884' required></div>
        </div>
        <div class='form-row'>
            <div class='form-group'><label>Publisher</label><input type='text' name='publisher' placeholder='e.g. Prentice Hall'></div>
            <div class='form-group'><label>Year</label><input type='number' name='year' placeholder='e.g. 2008'></div>
        </div>
        <div class='form-row'>
            <div class='form-group'><label>Quantity *</label><input type='number' name='quantity' placeholder='e.g. 5' min='1' required></div>
        </div>
        <div style='display:flex;gap:8px;padding-top:16px;border-top:1px solid #f0f0f0'>
            <button type='submit' class='btn btn-green'>Add Book</button>
            <button type='reset' class='btn btn-gray'>Clear</button>
            <a href='/books' class='btn btn-gray'>Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
