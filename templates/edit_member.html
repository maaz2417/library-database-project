{% extends 'base.html' %}
{% block content %}
<h1>Edit Member #{{ m.member_id }}</h1>
{% if msg %}
    {{ msg|safe }}
{% endif %}
<div class='card'>
    <form method='POST'>
        <div class='form-row'>
            <div class='form-group'><label>Full Name *</label><input type='text' name='name' value='{{ m.name }}' required></div>
            <div class='form-group'><label>Email *</label><input type='email' name='email' value='{{ m.email }}' required></div>
        </div>
        <div class='form-row'>
            <div class='form-group'><label>Phone</label><input type='text' name='phone' value='{{ m.phone or "" }}'></div>
            <div class='form-group'><label>Address</label><input type='text' name='address' value='{{ m.address or "" }}'></div>
        </div>
        <div style='display:flex;gap:8px;padding-top:16px;border-top:1px solid #f0f0f0'>
            <button type='submit' class='btn btn-blue'>Save Changes</button>
            <a href='/members' class='btn btn-gray'>Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
