{% extends 'base.html' %}
{% block content %}
<h1>Add New Member</h1>
{% if alert %}
    {{ alert|safe }}
{% endif %}
<div class='card'>
    <form method='POST' action='/members'>
        <div class='form-row'>
            <div class='form-group'><label>Full Name *</label><input type='text' name='name' placeholder='e.g. Ahmed Khan' required></div>
            <div class='form-group'><label>Email *</label><input type='email' name='email' placeholder='e.g. ahmed@email.com' required></div>
        </div>
        <div class='form-row'>
            <div class='form-group'><label>Phone</label><input type='text' name='phone' placeholder='e.g. 0300-1234567'></div>
            <div class='form-group'><label>Address</label><input type='text' name='address' placeholder='e.g. Peshawar'></div>
        </div>
        <div style='display:flex;gap:8px;padding-top:16px;border-top:1px solid #f0f0f0'>
            <button type='submit' class='btn btn-green'>Add Member</button>
            <button type='reset' class='btn btn-gray'>Clear</button>
            <a href='/members' class='btn btn-gray'>Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
